<style>
    /* --- Global & Base Resets --- */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }
    
    header {
        text-align: center;
        padding: 10px 0;
    }
    
    /* --- Navigation Styles (Mobile First) --- */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        position: relative;
    }

    .menu-toggle {
        display: block; /* Show hamburger on mobile */
        font-size: 1.5rem;
        background: none;
        border: none;
        cursor: pointer;
    }

    .nav-links {
        list-style: none;
        display: none; /* Hide links by default on mobile */
        flex-direction: column;
        width: 100%;
        position: absolute;
        top: 100%; /* Position below the navbar */
        left: 0;
        background-color: #fff;
        border-top: 1px solid #ddd;
        padding: 10px 0;
        margin: 0;
        z-index: 10;
    }

    .nav-links li {
        text-align: center;
        padding: 8px 0;
    }

    .nav-links a {
        text-decoration: none;
        color: #3e5e3c;
        display: block;
    }

    /* Class added by JavaScript to show the menu */
    .nav-links.active {
        display: flex;
    }

    /* --- Main Content Area (Image Overlay) --- */

    /* 1. Make Main the Positioning Context */
    main {
        position: relative; /* CRUCIAL for absolute children */
        width: 100%;
        height: auto;
        min-height: 50vh;
        overflow: hidden;
    }

    /* H2: Stays above the image */
    h2 {
        text-align: center;
        margin: 20px auto;
        width: 60%;
        color: #3e5e3c;
    }

    /* Image: Responsive and takes up space */
    .gros {
        width: 100%;
        height: auto; 
        max-height: 600px; 
        object-fit: cover;
        display: block;
    }

    /* 2. Position the Option Links container ABSOLUTELY over the image */
    /* We use the original .back and .day divs, but place them responsively */
    
    .back {
        position: absolute;
        top: 35%; /* Position higher on the image */
        left: 50%;
        transform: translateX(-50%); /* Center horizontally */
        z-index: 2;
        /* Removed unnecessary padding here */
    }

    .day {
        position: absolute;
        top: 60%; /* Position lower on the image */
        left: 50%;
        transform: translateX(-50%); /* Center horizontally */
        z-index: 2;
        /* Removed unnecessary padding here */
    }

    /* 3. Apply Original Button Styling to the Divs */
    .back, .day {
        background-color: white;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        width: 80%; /* Responsive width on mobile */
        max-width: 250px; /* Cap size on mobile */
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .back a, .day a {
        text-decoration: none;
        color: #333; /* Dark text for light button background */
        font-weight: normal;
        font-size: 1em;
    }

    /* --- Footer Styles --- */
    footer {
        padding: 10px;
        text-align: center;
        background-color: #f8f8f8;
        border-top: 1px solid #ddd;
    }


    /* --- Media Query for Desktop (Screen width > 768px) --- */
    @media screen and (min-width: 768px) {
        
        /* Desktop Nav: Hide toggle, show links horizontally */
        .menu-toggle {
            display: none;
        }

        .nav-links {
            display: flex;
            flex-direction: row;
            position: static;
            width: auto;
            background: none;
            border-top: none;
            padding: 0;
        }

        .nav-links li {
            padding: 0;
            margin-left: 20px;
        }

        /* Desktop Main Content: Position buttons side-by-side (Centered vertically) */
        
        /* 1. Reset width for original desktop look */
        .back, .day {
            width: 200px; /* Original fixed width */
        }
        
        /* 2. Reposition side-by-side */
        .back {
            top: 50%;
            left: 35%; 
            transform: translate(-50%, -55%); /* Adjusted slightly for visual centering */
        }

        .day {
            top: 50%;
            left: 65%; 
            transform: translate(-50%, -55%);
        }
    }
</style>
