    <title>MyTetons</title>
    <style>
        h2 {
            text-align: center;
            margin-bottom: 2%;
            padding: 2%;
        }

        html {
            background-color: #C8D6AF;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 700px;
            margin: auto;
            padding: 5%;
            gap: 1.5rem;
            place-items: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .box {
            width: 300px;
            height: 200px;
            background-color: white;
            color: #3e5e3c;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .box:hover {
            background-color: #f0f0f0;
        }


        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: 120px auto;
            position: relative;
        }

        .close {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 24px;
            cursor: pointer;
        }

        #reservationForm input {
            width: 100%;
            padding: 6px;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }

        #notes {
            width: 100%;
            /* full width of container */
            height: 100px;
            /* fixed height */
            padding: 8px;
            /* spacing inside */
            font-size: 14px;
            resize: vertical;
            margin-bottom: 10px;
        }

        #reservationForm {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
    </style>
</head>
